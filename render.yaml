# render.yaml — Render Blueprint (Infrastructure as Code)
# Render автоматически создаст все сервисы при импорте репозитория

services:
  # Backend API + WebSocket
  - type: web
    name: quest-platform-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm ci && npx prisma generate && npm run build
    startCommand: cd backend && npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: quest-platform-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: quest-platform-frontend
          property: url
    healthCheckPath: /api/health

  # Frontend (static site)
  - type: web
    name: quest-platform-frontend
    runtime: static
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: quest-platform-api
          property: url
      - key: VITE_WS_URL
        value: "" # будет вычислен в коде как wss://api-url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: quest-platform-db
    region: frankfurt
    plan: free
    databaseName: quest_platform
    postgresMajorVersion: "15"
