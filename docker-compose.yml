version: '3.9'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: quest_db
    environment:
      POSTGRES_DB: quest_platform
      POSTGRES_USER: quest_user
      POSTGRES_PASSWORD: quest_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quest_user -d quest_platform"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - quest_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quest_backend
    environment:
      DATABASE_URL: postgresql://quest_user:quest_pass@postgres:5432/quest_platform
      JWT_SECRET: super_secret_jwt_key_change_in_prod
      JWT_EXPIRES_IN: 7d
      PORT: 4000
      NODE_ENV: development
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - quest_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quest_frontend
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_WS_URL: ws://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - quest_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: quest_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - quest_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  quest_network:
    driver: bridge
